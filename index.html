<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>渋谷 カフェマップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toastContainer" class="toast-container"></div>

<div class="header">
  <h1><span>Shibuya</span> Cafe Map <span class="counter-badge" id="visitCount">-</span></h1>
  <div class="header-actions">
    <div class="weather-widget" id="weatherWidget">--°C</div>
    <button class="header-btn" id="appsBtn">関連アプリ</button>
    <button class="header-btn" id="changelogBtn">更新ログ</button>
    <button class="header-btn" id="actionLogBtn">操作ログ</button>
    <button class="header-btn dark-toggle" id="darkToggle">🌙</button>
    <button class="header-btn" id="inquiryBtn" style="display:none">問い合わせ</button>
    <button class="header-btn" id="likesBtn" style="display:none">いいね一覧</button>
    <button class="header-btn" id="recommendBtn">おすすめ</button>
    <button class="header-btn" id="adminBtn" style="display:none">管理</button>
    <button class="header-btn" id="exportBtn">出力</button>
    <button class="header-btn" id="importBtn">読込</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
    <button class="header-btn header-more" id="headerMoreBtn">•••</button>
    <div class="header-dropdown" id="headerDropdown"></div>
  </div>
</div>

<div class="auth-bar" id="authBar">
  <span id="authGreeting" style="font-size:13px;color:#5c4e43;white-space:nowrap">こんにちは、ゲストさん</span>
  <div id="authNotLoggedIn" style="display: flex; gap: 6px; flex-wrap: wrap; align-items: center;">
    <input type="email" id="authEmail" class="auth-input" placeholder="メールアドレス" autocomplete="email">
    <input type="password" id="authPassword" class="auth-input" placeholder="パスワード" autocomplete="current-password">
    <span id="authRegisterArea" class="auth-register-area auth-hidden">
      <input type="text" id="authUsername" class="auth-input username" placeholder="ユーザーネーム">
    </span>
    <button class="auth-btn" id="authLoginBtn">ログイン</button>
    <button class="auth-btn" id="authRegisterBtn">新規登録</button>
    <span class="auth-link" id="authToggleLink">アカウントをお持ちでない方はこちら</span>
    <div class="auth-error" id="authError"></div>
  </div>
  <div id="authLoggedIn" class="auth-hidden">
    <div class="auth-user">
      <strong id="authUsernameDisplay"></strong>
      <span class="auth-email" id="authEmailDisplay"></span>
      <span id="authUsernameSetup" class="auth-hidden">
        <input type="text" id="authSetupUsername" class="auth-input username" placeholder="ユーザーネームを設定">
        <button class="auth-btn" id="authSetupBtn">設定</button>
      </span>
      <button class="auth-btn auth-btn-out" id="authLogoutBtn">ログアウト</button>
    </div>
  </div>
</div>

<div id="map"></div>

<div class="list-panel" id="listPanel">
  <div style="display:flex;align-items:center;gap:8px;padding:12px 18px;border-bottom:1px solid rgba(74, 55, 40, 0.06)">
    <span style="font-size:15px;font-weight:700;color:#2b1c15;flex:1">カフェを探す</span>
    <button id="listCloseBtn" style="width:28px;height:28px;border:none;border-radius:50%;background:var(--bg-raised);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);">×</button>
  </div>
  <div class="list-search">
    <input type="text" id="searchBox" placeholder="カフェ名・住所で検索">
  </div>
  <div class="list-tag-filters" id="tagFilters"></div>
  <div class="list-items" id="listItems"></div>
</div>

<div class="map-click-hint" id="hint">地図をクリックして位置を指定</div>
<button class="form-toggle" id="formToggle">+</button>

<!-- フォームの背景を暗くするオーバーレイ -->
<div class="form-overlay" id="formOverlay"></div>

<div class="form-panel" id="formPanel">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
    <h2 id="formTitle" style="margin:0;">新しいカフェを登録</h2>
    <button class="modal-close" id="formCloseIcon">×</button>
  </div>
  <div class="form-group">
    <label for="cafeName">カフェ名</label>
    <input type="text" id="cafeName" placeholder="例：カフェ・ド・クリエ 渋谷店">
  </div>
  <div class="form-group">
    <label for="cafeAddress">住所 <span id="geoStatus" class="geo-status"></span></label>
    <input type="text" id="cafeAddress" placeholder="地図をクリックすると自動入力されます">
  </div>
  <div class="form-row">
    <div class="form-group">
      <label for="cafeLat">緯度</label>
      <input type="number" id="cafeLat" step="any" placeholder="例：35.6598">
    </div>
    <div class="form-group">
      <label for="cafeLng">経度</label>
      <input type="number" id="cafeLng" step="any" placeholder="例：139.7012">
    </div>
  </div>
  <div class="form-group">
    <label for="cafeDesc">一言コメント</label>
    <textarea id="cafeDesc" placeholder="例：落ち着いた雰囲気でゆったり過ごせる定番カフェ"></textarea>
  </div>
  <div class="form-group">
    <label>営業時間（任意）</label>
    <input type="text" id="cafeHours" placeholder="例：9:00〜18:00">
  </div>
  <div class="form-group">
    <label>Wi-Fi</label>
    <div class="form-radio-group" data-field="wifi"></div>
  </div>
  <div class="form-group">
    <label>電源</label>
    <div class="form-radio-group" data-field="power"></div>
  </div>
  <div class="form-group">
    <label>駐車場</label>
    <div class="form-radio-group" data-field="parking"></div>
  </div>
  <div class="form-group">
    <label>タグ（任意）</label>
    <div class="form-tags" id="formTags"></div>
  </div>
  <div class="form-group">
    <label>写真（任意）</label>
    <div class="photo-upload-area">
      <label class="photo-upload-btn" id="photoUploadBtn">写真を選択</label>
      <input type="file" id="photoInput" accept="image/*">
      <div class="photo-preview" id="photoPreview" style="display:none">
        <img id="photoPreviewImg">
        <button class="photo-remove" id="photoRemoveBtn">×</button>
      </div>
    </div>
  </div>
  <div class="form-actions">
    <button class="btn btn-cancel" id="formCancel">キャンセル</button>
    <button class="btn btn-primary" id="formSubmit">登録する</button>
  </div>
</div>

<div class="modal-overlay" id="appsModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>関連アプリ</h2>
      <button class="modal-close" id="appsClose">×</button>
    </div>
    <div class="modal-body" id="appsBody"></div>
  </div>
</div>

<div class="modal-overlay" id="changelogModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>更新ログ</h2>
      <button class="modal-close" id="changelogClose">×</button>
    </div>
    <div class="modal-body" id="changelogBody"></div>
  </div>
</div>

<div class="modal-overlay" id="actionLogModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>操作ログ</h2>
      <button class="modal-close" id="actionLogClose">×</button>
    </div>
    <div class="modal-body" id="actionLogBody"></div>
  </div>
</div>

<div class="modal-overlay" id="inquiryModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>問い合わせ</h2>
      <button class="modal-close" id="inquiryClose">×</button>
    </div>
    <div class="modal-body" id="inquiryBody">
      <div id="inquiryNewForm">
        <textarea id="inquiryText" class="inquiry-input" placeholder="管理者への連絡内容を入力してください（例：誤った情報の報告、要望など）"></textarea>
        <button class="btn btn-primary" id="inquirySendBtn">送信</button>
      </div>
      <div id="inquiryHistory" class="inquiry-history"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="likesModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>いいね一覧</h2>
      <button class="modal-close" id="likesClose">×</button>
    </div>
    <div class="modal-body">
      <div id="likesList" class="likes-list"></div>
    </div>
  </div>
</div>

<div class="sheet-overlay" id="recommendOverlay">
  <div class="sheet" id="recommendSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2>おすすめカフェ</h2>
      <button class="sheet-close" id="recommendClose">×</button>
    </div>
    <div class="sheet-body" id="recommendContent"></div>
    <div class="sheet-footer">
      <button class="btn btn-primary" id="recommendRetryBtn">もう一度引く</button>
      <button class="btn btn-cancel" id="recommendMapBtn">地図で見る</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="adminModal">
  <div class="modal-content modal-content-wide">
    <div class="modal-header">
      <h2>管理パネル</h2>
      <button class="modal-close" id="adminClose">×</button>
    </div>
    <div class="modal-body" id="adminBody">
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="users">ユーザー管理</button>
        <button class="admin-tab" data-tab="inquiries">問い合わせ <span id="inquiryBadge" class="badge" style="display:none">0</span></button>
        <button class="admin-tab" data-tab="apps">関連アプリ</button>
      </div>
      <div id="adminTabUsers" class="admin-tab-content active">
        <div class="admin-section">
          <div class="admin-section-title">登録ユーザー一覧</div>
          <div id="adminUserList" class="admin-user-list"></div>
        </div>
      </div>
      <div id="adminTabInquiries" class="admin-tab-content">
        <div class="admin-section">
          <div class="admin-section-title">問い合わせ一覧</div>
          <div id="adminInquiryList" class="admin-inquiry-list"></div>
        </div>
      </div>
      <div id="adminTabApps" class="admin-tab-content">
        <div class="admin-section">
          <div class="admin-section-title">関連アプリ管理</div>
          <div id="adminAppsList" class="admin-apps-list"></div>
          <div style="margin-top:12px">
            <button class="btn btn-primary" id="adminAppAddBtn" style="flex:none;padding:8px 16px;font-size:12px">アプリを追加</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
